<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table tag:span row/column </title>
</head>
<body>
    <table border="2">
        <tr>
            <th colspan="3">
                student details
            </th>
        </tr>
        <tr>
            <td>name</td>
            <td>sanjeev</td>
            <td>harshith</td>
        </tr>
        <tr>
            <td>course</td>
            <td>cse</td>
            <td>cse</td>
        </tr>
    </table>
    <p>Rowspan</p>
    <table border="2">
        <tr>
            <th rowspan="2">day</th>
            <th>morning</th>
            <th>evening</th>
        </tr>
        <tr>
            <td>frontend learning</td>
            <td>frontend practice</td>
        </tr>
    </table>
</body>
</html>
