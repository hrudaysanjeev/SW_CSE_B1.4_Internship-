<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p>Html Table</p>

            <th>Month</th>
            <th>Savings</th>

        </tr>
    </table>

</html>
