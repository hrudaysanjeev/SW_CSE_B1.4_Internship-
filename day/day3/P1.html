<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tables</title>
</head>
<body>
    <p>Html Table</p>
    <table border="2">
        <caption>Monthly savings</caption>
        <tr>
            <th>Month</th>
            <th>Savings</th>
        </tr>
        <tr>
            <td>June</td>
            <td>3000</td>
        </tr>
        <tr>
            <td>July</td>
            <td>4000</td>
        </tr>
    </table>

    <table border="2">
        <caption>sales data</caption>
        <thead>
            <tr>
                <th>month</th>
                <th>sales</th>
            </tr>
        </thead>
        <tbody>
          <tr>
            <td>June</td>
            <td>3000</td>
        </tr>
        <tr>
            <td>July</td>
            <td>4000</td>
        </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>total</td>
                <td>7000</td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
