<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Audio Tag</title>
</head>
<body>
    <p>Audio Tag</p>
    <audio src="sample-3s.mp3" controls>
        your browser does not support audio tag
    </audio>

    <p>auto play</p>
    <audio src="sample-3s.mp3" autoplay controls>
        your browser does not support audio tag
    </audio>

    <p>muted</p>
    <audio src="sample-3s.mp3" muted autoplay controls>
        your browser does not support audio tag
    </audio>

    <p>loop </p>
    <audio src="sample-3s.mp3" preload="auto" controls>
        your browser does not support audio tag
    </audio>
</body>
</html>
