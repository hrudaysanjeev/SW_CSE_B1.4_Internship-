<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>column group</title>
</head>
<body>
    <table border="2">
        <colgroup>
            <col>
            <col>
        </colgroup>
        <tr>
            <th>name</th>
            <th>marks</th>
        </tr>
        <tr>
            <td>sanjeev</td>
            <td>45</td>
        </tr>
        <tr>
            <td>harshi</td>
            <td>47</td>
        </tr>
    </table>
</body>
</html>
