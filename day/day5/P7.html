<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL colors</title>
    <style>
        p{
            color: hsl(304, 97%, 45%);
            font-size: large;
        }
        h1{
            /* HEX COLORS: 00 to FF (0-255) */
            color: hsl(195, 46%, 53%, 0.578);
        }
    </style>
</head>
<body>
    <p>Paragraph</p>
    <h1>Heading 1</h1>
   
</body>
</html>
