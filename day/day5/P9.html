<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Units ALL in one example</title>
    <style>
        html{
            font-size: 16px;
        }
        body{
            font-size: 1rem;
            margin: 0;
            padding: 0;
        }
        .container{
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            padding: 2rem 1rem;
        }
        h1{
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        p{
            font-size: 1rem;
            line-height: 1.6;
            max-width: 65px;
        }
        .hero{
            height: 80vh;
            font-size: 5vw;
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Sanjeev Katta</h1>
    </div>
    <div class="container">
        <h2>CSS Units</h2>
        <p>Eample for CSS Units usage</p>
    </div>
</body>
</html>
